model_list:
  # ── MiniMax M2.5 ($0.30/$1.20 per M) ───────────────────────────
  - model_name: minimax-m2
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY

  # ── Claude Opus 4.5 ($5/$25 per M) ─────────────────────────────
  - model_name: claude-opus-4-5
    litellm_params:
      model: anthropic/claude-opus-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Claude Sonnet 4 — ≤200k ctx ($3/$15 per M) ─────────────────
  - model_name: claude-sonnet-4
    litellm_params:
      model: anthropic/claude-sonnet-4
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015

  # ── Claude Sonnet 4 — >200k ctx ($6/$22.50 per M) ──────────────
  - model_name: claude-sonnet-4-extended
    litellm_params:
      model: anthropic/claude-sonnet-4
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      input_cost_per_token: 0.000006
      output_cost_per_token: 0.0000225

  # ── Claude Sonnet 4.5 — ≤200k ctx ($3/$15 per M) ───────────────
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015

  # ── Claude Sonnet 4.5 — >200k ctx ($6/$22.50 per M) ────────────
  - model_name: claude-sonnet-4-5-extended
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      input_cost_per_token: 0.000006
      output_cost_per_token: 0.0000225

  # ── GPT-5.1 Codex ($1.25/$10 per M, cached $0.125) ─────────────
  - model_name: gpt-5.1-codex
    litellm_params:
      model: openai/gpt-5.1-codex
      api_key: os.environ/OPENAI_API_KEY

  # ── GPT-5.2 ($1.75/$14 per M, cached $0.175) ───────────────────
  - model_name: gpt-5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY

  # ── OpenAI Embeddings ───────────────────────────────────────────────
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_API_KEY
  store_model_in_db: true
  store_prompts_in_spend_logs: true
